name: Publication Voltixai Infosport

on:
  schedule:
    - cron: '*/3 * * * *'  # Toutes les 3 minutes, 24h/24
  workflow_dispatch:       # Lancement manuel autorisé en plus

permissions:
  contents: read

jobs:
  execution:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Vérifier et lancer le robot
        env:
          ANYSPORT_API_KEY: ${{ secrets.ANYSPORT_API_KEY }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_TOKEN: ${{ secrets.FACEBOOK_TOKEN }}
        run: |
          echo "📂 Fichiers présents :"
          ls -la
          echo "⚽ Lancement du robot..."
          node index.js
          
