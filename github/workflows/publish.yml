name: Publication Voltixai Infosport
on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:

jobs:
  execution:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Vérifier emplacement et lancer
        env:
          ANYSPORT_API_KEY: ${{ secrets.ANYSPORT_API_KEY }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_TOKEN: ${{ secrets.FACEBOOK_TOKEN }}
        run: |
          pwd
          ls -la
          node index.js
          
